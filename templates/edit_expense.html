{% extends "base.html" %}

{% block title %}Edit Expense - SmartSpend{% endblock %}

{% block extra_css %}
<style>
    .page-header {
        text-align: center;
        color: white;
        margin-bottom: 60px;
    }

    .page-header h1 {
        font-family: 'Poppins', sans-serif;
        font-size: 2.5em;
        font-weight: 700;
        margin-bottom: 18px;
    }

    .page-header h1 .gradient-text {
        background: linear-gradient(135deg, #60A5FA 0%, #3B82F6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .page-header p {
        font-size: 1.1em;
        opacity: 0.85;
        color: #F0F9FF;
        background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
        padding: 10px 25px;
        border-radius: 25px;
        display: inline-block;
        border: 1px solid rgba(34, 197, 94, 0.3);
        backdrop-filter: blur(10px);
        font-weight: 500;
        margin: 0;
    }

    .form-container {
        max-width: 600px;
        margin: 0 auto;
        background: #1E293B;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        border: 1px solid #334155;
    }

    .form-group {
        margin-bottom: 25px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #CBD5E1;
        font-weight: 500;
        font-size: 0.95em;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    label i {
        margin-right: 5px;
        color: #3B82F6;
    }

    input, select, textarea {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #334155;
        border-radius: 10px;
        font-family: 'Inter', sans-serif;
        font-size: 1em;
        transition: all 0.3s ease;
        background-color: #0F172A;
        color: #F0F4F8;
    }

    input::placeholder, select::placeholder, textarea::placeholder {
        color: #64748B;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #3B82F6;
        background-color: #0F172A;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15), 0 0 0 1px #3B82F6;
    }

    textarea {
        resize: vertical;
        min-height: 100px;
        font-size: 0.95em;
    }

    select {
        cursor: pointer;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23A0AEC0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 12px center;
        background-size: 20px;
        padding-right: 40px;
    }

    .btn-group {
        display: flex;
        gap: 15px;
        margin-top: 40px;
        justify-content: center;
    }

    .btn {
        padding: 14px 30px;
        border: none;
        border-radius: 10px;
        font-family: 'Inter', sans-serif;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex: 1;
    }

    .btn-submit {
        background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 100%);
        color: white;
        border: 2px solid transparent;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }

    .btn-submit:active {
        transform: translateY(0);
    }

    .btn-cancel {
        background: transparent;
        color: #CBD5E1;
        border: 2px solid #334155;
    }

    .btn-cancel:hover {
        background: #1E293B;
        color: #F0F4F8;
        border-color: #475569;
    }

    .form-description {
        color: #94A3B8;
        font-size: 0.85em;
        margin-bottom: 40px;
        text-align: center;
        font-style: italic;
    }

    @media (max-width: 768px) {
        .form-container {
            padding: 30px 20px;
        }

        .page-header h1 {
            font-size: 2em;
        }

        .btn-group {
            flex-direction: column;
        }

        .btn {
            width: 100%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>✏️ <span class="gradient-text">Edit Expense</span></h1>
    <p style="margin-bottom: 50px;">Update the expense details</p>
</div>

<div class="form-container">
    <p class="form-description">Modify the expense information below and save your changes</p>
    
    <form method="POST" enctype="application/x-www-form-urlencoded">
        <div class="form-group">
            <label for="amount">
                <i class="fas fa-rupee-sign"></i>Amount
            </label>
            <input type="number" id="amount" name="amount" step="0.01" value="{{ expense['amount'] }}" required>
        </div>

        <div class="form-group">
            <label for="category">
                <i class="fas fa-tag"></i>Category
            </label>
            <select id="category" name="category" required>
                <option value="">Select a category</option>
                <option value="Food" {% if expense['category'] == 'Food' %}selected{% endif %}>🍔 Food & Dining</option>
                <option value="Transportation" {% if expense['category'] == 'Transportation' %}selected{% endif %}>🚗 Transportation</option>
                <option value="Entertainment" {% if expense['category'] == 'Entertainment' %}selected{% endif %}>🎬 Entertainment</option>
                <option value="Utilities" {% if expense['category'] == 'Utilities' %}selected{% endif %}>💡 Utilities</option>
                <option value="Healthcare" {% if expense['category'] == 'Healthcare' %}selected{% endif %}>🏥 Healthcare</option>
                <option value="Shopping" {% if expense['category'] == 'Shopping' %}selected{% endif %}>🛍️ Shopping</option>
                <option value="Education" {% if expense['category'] == 'Education' %}selected{% endif %}>📚 Education</option>
                <option value="Travel" {% if expense['category'] == 'Travel' %}selected{% endif %}>✈️ Travel</option>
                <option value="Other" {% if expense['category'] == 'Other' %}selected{% endif %}>📌 Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">
                <i class="fas fa-file-alt"></i>Description (Optional)
            </label>
            <textarea id="description" name="description" placeholder="Add any notes about this expense...">{{ expense['description'] or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="date">
                <i class="fas fa-calendar-alt"></i>Date
            </label>
            <input type="date" id="date" name="date" value="{{ expense['date'] }}" required>
        </div>

        <div class="btn-group">
            <a href="/expenses" class="btn btn-cancel">
                <i class="fas fa-times"></i>Cancel
            </a>
            <button type="submit" class="btn btn-submit">
                <i class="fas fa-save"></i>Save Changes
            </button>
        </div>
    </form>
</div>

{% endblock %}
